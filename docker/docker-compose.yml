version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: 2fa_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: 2fa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - 2fa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: 2fa_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - 2fa_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: 2fa_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:secret@postgres:5432/2fa_db
      - DATABASE_URL_SYNC=postgresql://postgres:secret@postgres:5432/2fa_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../app:/app/app
      - ../firebase-credentials.json:/app/firebase-credentials.json:ro
    networks:
      - 2fa_network
    restart: unless-stopped

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: 2fa_adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - 2fa_network
    restart: unless-stopped

networks:
 2fa_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: